aid: manulife
name: Manulife
description: >-
  Manulife Financial Corporation is a Canadian multinational insurance and
  financial services company providing life insurance, health insurance,
  wealth and asset management, banking, and group benefits. Manulife operates
  under the Manulife brand in Canada and Asia and through John Hancock
  Financial in the United States, with Manulife Bank of Canada and Manulife
  Investment Management as key subsidiaries. The company is the largest
  insurance company in Canada and serves millions of customers worldwide.
  Manulife does not currently publish a public developer API or developer
  portal; partner integrations are managed through closed channels.
